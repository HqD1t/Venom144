name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # кнопка "Run workflow" в GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"   # AGP 8.5.x несовместим с Gradle 9

      # google-services.json из секрета GOOGLE_SERVICES_JSON (Settings -> Secrets -> Actions).
      # Если секрета нет — используется заглушка, чтобы проверить, что код компилируется.
      - name: Put google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
            echo "Использую google-services.json из секрета"
          else
            cp app/google-services.stub.json app/google-services.json
            echo "ВНИМАНИЕ: собираю с заглушкой — Firebase в таком APK работать не будет"
          fi

      # Release быстрее debug в разы — для тестов на телефоне бери именно его
      - name: Build APKs
        run: gradle assembleDebug assembleRelease --no-daemon
        env:
          VERSION_CODE: ${{ github.run_number }}

      - name: Upload release APK (быстрый — ставь этот)
        uses: actions/upload-artifact@v4
        with:
          name: VenomClub-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VenomClub-debug
          path: app/build/outputs/apk/debug/app-debug.apk
